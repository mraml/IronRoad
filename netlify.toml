# Optional: connect this repo to Netlify, or run `npm run build` and drag the `dist` folder
# into https://app.netlify.com/drop — you get a public URL that works on phones and tablets.

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
